<!DOCTYPE html>
<html lang="pt-BR">
<head>



<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Matte Book</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
height:100vh;
display:grid;
place-items:center;
background:#f3efe8;
font-family:Georgia,serif;
}

/* LIVRO */

.book{
position:relative;
width:290px;
height:430px;
padding:30px;
overflow:hidden;
border-radius:6px 18px 18px 6px;
background:
linear-gradient(160deg,#2b211c,#181311);
box-shadow:
0 18px 35px rgba(0,0,0,.18),
0 2px 5px rgba(0,0,0,.12);
transition:.35s;
}

/* lombada */

.book::before{
content:"";
position:absolute;
left:0;
top:0;
width:10px;
height:100%;
background:
linear-gradient(
90deg,
#3a281d,
#5b4130,
#2a1d15);
box-shadow:
inset -1px 0 rgba(255,255,255,.05),
1px 0 rgba(0,0,0,.25);
}

/* textura fosca */

.book::after{
content:"";
position:absolute;
inset:0;
opacity:.035;
background:
repeating-linear-gradient(
45deg,
rgba(255,255,255,.5) 0,
rgba(255,255,255,.5) 1px,
transparent 2px,
transparent 4px),
repeating-linear-gradient(
-45deg,
rgba(0,0,0,.35) 0,
rgba(0,0,0,.35) 1px,
transparent 3px,
transparent 6px);
pointer-events:none;
}

.book:hover{
transform:
translateY(-8px)
scale(1.015);
box-shadow:
0 28px 50px rgba(0,0,0,.22),
0 4px 8px rgba(0,0,0,.12);
}

/* brilho bem suave no topo simulando luz ambiente */

.light{
position:absolute;
left:25px;
right:25px;
top:22px;
height:90px;
background:
radial-gradient(
ellipse at center,
rgba(255,255,255,.035),
transparent 75%);
}

/* conteúdo */

.category{
margin-top:115px;
font:700 10px Arial;
letter-spacing:4px;
text-transform:uppercase;
color:#b99157;
}

h1{
margin-top:12px;
font-size:42px;
line-height:1;
font-weight:600;
color:#f5f1eb;
text-shadow:
0 1px rgba(255,255,255,.05),
0 -1px rgba(0,0,0,.5);
}

.author{
margin-top:12px;
font:16px Arial;
color:#c6beb4;
}

.quote{
position:absolute;
left:30px;
right:30px;
bottom:58px;
font:15px Arial;
line-height:1.55;
color:#ddd6cd;
}

.footer{
position:absolute;
left:30px;
right:30px;
bottom:22px;
padding-top:12px;
border-top:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
font:13px Arial;
color:#b99157;
}
</style>
</head>

<body>

<div class="book">

<div class="light"></div>

<div class="category">Produtividade</div>

<h1>Hábitos<br>Atômicos</h1>

<div class="author">
James Clear
</div>

<div class="quote">
Pequenas melhorias diárias produzem resultados extraordinários ao longo do tempo.
</div>

<div class="footer">
<span>15 min</span>
<span>→ Ler</span>
</div>

</div>

</body>
</html>
